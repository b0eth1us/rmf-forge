version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - rmf-internal
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - rmf-data:/app/data/projects
    environment:
      - DATABASE_URL=postgresql://rmfforge:rmfforge@postgres:5432/rmfforge
      - SECRET_KEY=change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rmf-internal
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rmfforge
      POSTGRES_PASSWORD: rmfforge
      POSTGRES_DB: rmfforge
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - rmf-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rmfforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres-data:
  rmf-data:

networks:
  rmf-internal:
    driver: bridge
